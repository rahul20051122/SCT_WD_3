<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Grid // Tic-Tac-Toe</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background glow elements -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <!-- Main App Container -->
    <main class="app-container">
        <!-- Header Section -->
        <header class="header">
            <h1 class="title">NEON<span>GRID</span></h1>
            <p class="subtitle">A Futuristic Tic-Tac-Toe Experience</p>
        </header>

        <!-- Mode Toggle Section -->
        <section class="mode-selector-container">
            <div class="mode-selector">
                <button id="btn-pvp" class="mode-btn active" data-mode="pvp">
                    <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    PvP (Local)
                </button>
                <button id="btn-ai" class="mode-btn" data-mode="ai">
                    <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M12 2v2"></path><line x1="8" y1="5" x2="16" y2="5"></line><circle cx="8" cy="16" r="1"></circle><circle cx="16" cy="16" r="1"></circle></svg>
                    vs AI (Unbeatable)
                </button>
            </div>
        </section>

        <!-- Turn Indicator Section -->
        <section class="turn-indicator-card">
            <div class="turn-track">
                <div id="turn-slider" class="turn-slider turn-x"></div>
                <div class="turn-pill player-x-turn active" id="turn-x-label">
                    <span class="symbol-dot dot-x"></span>
                    <span>X Turn</span>
                </div>
                <div class="turn-pill player-o-turn" id="turn-o-label">
                    <span class="symbol-dot dot-o"></span>
                    <span>O Turn</span>
                </div>
            </div>
        </section>

        <!-- Game Board Grid -->
        <section class="board-container">
            <div class="board" id="board">
                <!-- 9 grid cells -->
                <button class="cell" data-index="0" aria-label="Cell 1"></button>
                <button class="cell" data-index="1" aria-label="Cell 2"></button>
                <button class="cell" data-index="2" aria-label="Cell 3"></button>
                <button class="cell" data-index="3" aria-label="Cell 4"></button>
                <button class="cell" data-index="4" aria-label="Cell 5"></button>
                <button class="cell" data-index="5" aria-label="Cell 6"></button>
                <button class="cell" data-index="6" aria-label="Cell 7"></button>
                <button class="cell" data-index="7" aria-label="Cell 8"></button>
                <button class="cell" data-index="8" aria-label="Cell 9"></button>
            </div>
        </section>

        <!-- Scoreboard Info -->
        <section class="scoreboard">
            <!-- X Score -->
            <div class="score-card x-card" id="score-card-x">
                <div class="card-label">PLAYER X</div>
                <div class="card-value" id="score-x">0</div>
                <div class="card-glow"></div>
            </div>
            
            <!-- Tie Score -->
            <div class="score-card tie-card">
                <div class="card-label">DRAWS</div>
                <div class="card-value" id="score-ties">0</div>
                <div class="card-glow"></div>
            </div>

            <!-- O Score / AI Score -->
            <div class="score-card o-card" id="score-card-o">
                <div class="card-label" id="label-player-o">PLAYER O</div>
                <div class="card-value" id="score-o">0</div>
                <div class="card-glow"></div>
            </div>
        </section>

        <!-- Quick Game Controls -->
        <section class="controls">
            <button id="btn-restart" class="control-btn accent-btn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
                Restart Match
            </button>
            <button id="btn-reset-scores" class="control-btn secondary-btn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"></path></svg>
                Reset Stats
            </button>
        </section>
    </main>

    <!-- Fullscreen Win / Draw Modal Overlay -->
    <div id="result-overlay" class="result-overlay">
        <!-- Confetti Canvas -->
        <canvas id="confetti-canvas" class="confetti-canvas"></canvas>
        
        <div class="result-modal">
            <div class="winner-symbol-wrapper" id="winner-symbol-container">
                <!-- Dynamic SVG will be injected here -->
            </div>
            <h2 class="result-title" id="result-text">PLAYER X WINS!</h2>
            <p class="result-subtitle" id="result-subtext">Dominating performance on the grid.</p>
            <button id="btn-play-again" class="play-again-btn">
                <span>Play Next Round</span>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </div>
    </div>

    <!-- Script file -->
    <script src="script.js"></script>
</body>
</html>
